<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="100%" height="100%">
  <defs>
    <!-- Realistic Luxury Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E7C4" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#C5A02B" />
      <stop offset="100%" stop-color="#8C6D1F" />
    </linearGradient>
    <!-- Drop Shadow for 3D realism -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Monogram AR -->
  <g transform="translate(10, 0)" filter="url(#softShadow)">
    <!-- Stylized A left stroke -->
    <path d="M 22,100 L 48,22" stroke="url(#goldGradient)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Stylized A right stroke / R stem -->
    <path d="M 48,22 L 48,100" stroke="url(#goldGradient)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- R loop -->
    <path d="M 48,22 C 70,22 76,42 70,54 C 64,62 56,62 48,62" stroke="url(#goldGradient)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- R leg -->
    <path d="M 48,62 L 70,100" stroke="url(#goldGradient)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Architectural Door inside A (y=62 to 100) -->
    <path d="M 35,100 L 35,62 L 48,62" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <line x1="41" y1="62" x2="41" y2="100" stroke="url(#goldGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" />
    <line x1="45" y1="62" x2="45" y2="100" stroke="url(#goldGradient)" stroke-width="1" stroke-linecap="round" fill="none" />
  </g>
  
  <!-- Vertical Divider Line -->
  <line x1="105" y1="25" x2="105" y2="95" stroke="#111111" stroke-opacity="0.15" stroke-width="1" />
  
  <!-- Wordmark Text (Charcoal & Gold) -->
  <g font-family="'DM Sans', sans-serif">
    <!-- AMANO (Spaced & Weighted) -->
    <text x="125" y="48" font-size="28" font-weight="600" letter-spacing="0.25em" fill="#111111">AMANO</text>
    <!-- INTERIORS (Gold, bordered) -->
    <text x="125" y="72" font-size="11" font-weight="500" letter-spacing="0.32em" fill="url(#goldGradient)">— INTERIORS —</text>
  </g>
  <!-- Tagline -->
  <g font-family="'Hanken Grotesk', sans-serif">
    <text x="128" y="93" font-size="8" font-weight="600" letter-spacing="0.22em" fill="#747878">DESIGNED AROUND LIFE</text>
  </g>
</svg>
